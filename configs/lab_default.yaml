lab:
  name: multi-agent-research-lab
  max_iterations: 6
  timeout_seconds: 60

agents:
  supervisor:
    model: gpt-4o-mini
    temperature: 0.0
  researcher:
    model: gpt-4o-mini
    temperature: 0.2
  analyst:
    model: gpt-4o-mini
    temperature: 0.1
  writer:
    model: gpt-4o-mini
    temperature: 0.4

benchmark:
  queries:
    - "Research GraphRAG state-of-the-art and write a 500-word summary"
    - "Compare single-agent and multi-agent workflows for customer support"
    - "Summarize production guardrails for LLM agents"
